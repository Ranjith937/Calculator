<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="calculator">
        <div class="output">
            <div class="calculation">
                <p id="real-calc"></p>
            </div>
        </div>
        
        <div class="grid-container">
            <button class="operators ac">AC</button>
            <button class="operators">%</button>
            <button class="operators delete">
                <i class="fa-solid fa-delete-left" style="color: #ffffff;"></i>
            </button>
            <button class="operators">&#247;</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operators">x</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operators">-</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operators">+</button>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button id="equals">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
